<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review Answers</title>
    <link rel="stylesheet" href="app.css" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

      body {
        display: flex;
        font-family: 'Press Start 2P', monospace;
        margin: 0;
        height: 100vh;
        overflow: hidden;
        background-color: #0f0e17;
        background-image:
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 8px 8px;
        font-size: 62.5%;
      }

      .sidebar {
        width: 180px;
        background-color: #1a1c2c;
        border-right: 4px solid #000;
        overflow-y: auto;
        padding: 1rem;
      }

      .sidebar button {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        padding: 0.8rem 0.5rem;
        margin-bottom: 6px;
        background: #0f0e17;
        border: 2px solid #000;
        box-shadow: 3px 3px 0 #000;
        text-align: left;
        font-size: 1rem;
        font-family: 'Press Start 2P', monospace;
        color: #f4f4f8;
        cursor: pointer;
      }

      .sidebar button:hover {
        background-color: #29366f;
        transform: translate(1px, 1px);
        box-shadow: 2px 2px 0 #000;
      }

      .sidebar .Q {
        font-size: 1rem;
        margin-right: 6px;
        color: #5fcde4;
      }

      .sidebar .icon {
        font-size: 1.2rem;
        margin-left: 6px;
      }

      .main {
        flex: 1;
        overflow-y: auto;
        padding: 2rem;
        background-color: #0f0e17;
      }

      .question-block {
        margin-bottom: 2rem;
      }

      .question-title {
        font-size: 1.6rem;
        font-family: Arial, Helvetica, sans-serif;
        margin-bottom: 1.5rem;
        color: #f4f4f8;
        line-height: 1.8;
        text-shadow: 2px 2px 0 #000;
      }

      .choice {
        margin: 0.8rem 0;
        font-size: 1.4rem;
        font-family: Arial, Helvetica, sans-serif;
        padding: 1rem;
        background-color: #1a1c2c;
        border: 2px solid #000;
        box-shadow: 3px 3px 0 #000;
        line-height: 1.8;
        color: #f4f4f8;
      }

      .correct {
        color: #00b543;
        border-color: #00b543;
      }

      .incorrect {
        color: #ff004d;
        border-color: #ff004d;
        text-decoration: underline;
      }

      .user-selected {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="author-credit">
      Made by namnv7@mbbank.com.vn
    </div>
    <div class="sidebar" id="questionList"></div>
    <div class="main">
      <div id="questionDetail">
        <h2>Select a question to review</h2>
      </div>
    </div>

    <script>
      const reviewData = JSON.parse(localStorage.getItem("review")) || [];
      const listContainer = document.getElementById("questionList");
      const detailContainer = document.getElementById("questionDetail");

      reviewData.forEach((entry, index) => {
        const btn = document.createElement("button");
        const span = document.createElement("span");
        const icon = document.createElement("span");

        // Determine if user's answer is correct
        const isCorrect = arraysEqual(
          entry.selected.sort(),
          entry.correct.sort()
        );

        span.classList.add("Q");
        span.textContent = `Q${index + 1}`;
        icon.classList.add("icon");
        icon.textContent = isCorrect ? "✅" : "❌";

        btn.appendChild(span);
        btn.appendChild(icon);

        btn.onclick = () => showDetail(index);
        listContainer.appendChild(btn);
      });

      function showDetail(idx) {
        const entry = reviewData[idx];
        detailContainer.innerHTML = "";

        const title = document.createElement("div");
        title.classList.add("question-title");
        title.textContent = `Q${idx + 1}: ${entry.question}`;
        detailContainer.appendChild(title);

        entry.choices.forEach((choice) => {
          const p = document.createElement("p");
          p.classList.add("choice");
          p.textContent = choice.text;

          if (entry.correct.includes(choice.index.toString())) {
            p.classList.add("correct");
          }

          if (entry.selected.includes(choice.index.toString())) {
            p.classList.add("user-selected");
            if (!entry.correct.includes(choice.index.toString())) {
              p.classList.add("incorrect");
            }
          }

          detailContainer.appendChild(p);
        });

        const backBtn = document.createElement("a");
        backBtn.href = "/";
        backBtn.textContent = "Back to Home";
        backBtn.classList.add("btn");
        backBtn.style.display = "inline-block";
        backBtn.style.marginTop = "2rem";

        detailContainer.appendChild(backBtn);
      }

      function arraysEqual(a, b) {
        return a.length === b.length && a.every((val, i) => val === b[i]);
      }
    </script>
    <div class="donate-footer">
      <a href="#" onclick="alert('Hehe, không cần đâu ạ (nhưng có lòng thì vẫn nhận, nhắn cho namnv7 nha anh chị =)))) :3'); return false;">Donate ở đây</a>
    </div>
  </body>
</html>
