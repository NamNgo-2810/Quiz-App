<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Quick Quiz</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <div class="author-credit">
      Made by namnv7@mbbank.com.vn
      <br/>
      Mọi người có bộ đề khác cần add để ôn có thể liên hệ em!
    </div>
    <div class="container">
      <div id="home" class="flex-center flex-column">
        <h1>Quiz App</h1>

        <form>
          <select id="topicSelect" onchange="updateQuestionLimit()">
            <option value="">Select a topic...</option>
            <!-- Topics will be dynamically loaded here -->
          </select>

          <div id="groupContainer" style="display:none;">
            <p class="group-label">Chọn nhóm câu hỏi (bỏ chọn = lấy tất cả):</p>
            <div id="groupCheckboxes" class="group-checkboxes"></div>
          </div>

          <input
          type="number"
          id="questionCount"
          placeholder="Enter number of questions (e.g., 10)"
          min="1"
          disabled
          />
        </form>


        <button class="btn" onclick="startQuiz()" disabled id="startBtn">Start Quiz</button>
        <a class="btn" href="/highscores.html">High Scores</a>
      </div>
    </div>

    <script>
      async function logVisit() {
        try {
          // Let the server detect the IP from request headers
          const response = await fetch('/api/log?page=home');
          const data = await response.json();
          console.log('Client IP detected:', data.ip);
        } catch (error) {
          console.error('Failed to log visit:', error);
        }
      }
      logVisit();
    </script>

    <script>
      // Dynamic topic configuration - will be loaded from manifest
      let topicConfig = {};

      // Function to load topics from manifest
      async function loadTopics() {
        try {
          const response = await fetch('./questions-manifest.json');
          if (!response.ok) {
            throw new Error('Failed to load questions manifest');
          }
          const manifest = await response.json();

          // Convert manifest to topicConfig format and populate dropdown
          const topicSelect = document.getElementById("topicSelect");

          manifest.topics.forEach(topic => {
            topicConfig[topic.filename] = {
              name: topic.displayName,
              maxQuestions: topic.questionCount,
              path: topic.path,
              groups: topic.groups || null
            };

            // Add option to dropdown
            const option = document.createElement("option");
            option.value = topic.filename;
            option.textContent = `${topic.displayName} (${topic.questionCount} questions)`;
            topicSelect.appendChild(option);
          });

        } catch (error) {
          console.error('Error loading topics:', error);
          alert('Failed to load quiz topics. Please refresh the page.');
        }
      }

      // Load topics when page loads
      document.addEventListener('DOMContentLoaded', loadTopics);

      function updateQuestionLimit() {
        const topicSelect = document.getElementById("topicSelect");
        const questionCountInput = document.getElementById("questionCount");
        const startBtn = document.getElementById("startBtn");
        const groupContainer = document.getElementById("groupContainer");
        const groupCheckboxes = document.getElementById("groupCheckboxes");

        const selectedTopic = topicSelect.value;

        if (selectedTopic) {
          const config = topicConfig[selectedTopic];
          questionCountInput.disabled = false;
          questionCountInput.max = config.maxQuestions;
          questionCountInput.placeholder = `Enter number of questions you want to do`;
          startBtn.disabled = false;

          // Show group selector if topic has groups
          if (config.groups && config.groups.length > 0) {
            groupCheckboxes.innerHTML = "";
            config.groups.forEach(group => {
              const label = document.createElement("label");
              label.className = "group-checkbox-label";
              const cb = document.createElement("input");
              cb.type = "checkbox";
              cb.value = group;
              cb.name = "group";
              cb.addEventListener("change", updateGroupFilter);
              label.appendChild(cb);
              label.appendChild(document.createTextNode(" " + group));
              groupCheckboxes.appendChild(label);
            });
            groupContainer.style.display = "block";
          } else {
            groupContainer.style.display = "none";
            groupCheckboxes.innerHTML = "";
          }
        } else {
          questionCountInput.disabled = true;
          questionCountInput.value = "";
          questionCountInput.placeholder = "Select a topic first";
          startBtn.disabled = true;
          groupContainer.style.display = "none";
          groupCheckboxes.innerHTML = "";
        }
      }

      function updateGroupFilter() {
        const topicSelect = document.getElementById("topicSelect");
        const questionCountInput = document.getElementById("questionCount");
        const selectedTopic = topicSelect.value;
        const checked = Array.from(document.querySelectorAll("#groupCheckboxes input:checked"));

        if (checked.length > 0) {
          // When groups are selected, remove hard max (we don't know per-group counts)
          questionCountInput.removeAttribute("max");
          questionCountInput.placeholder = "Enter number of questions (filtered by group)";
        } else {
          const maxQuestions = topicConfig[selectedTopic].maxQuestions;
          questionCountInput.max = maxQuestions;
          questionCountInput.placeholder = "Enter number of questions you want to do";
        }
      }

      function startQuiz() {
        const topicSelect = document.getElementById("topicSelect");
        const selectedTopic = topicSelect.value;
        const count = parseInt(document.getElementById("questionCount").value);

        if (!selectedTopic) {
          alert("Please select a topic first.");
          return;
        }

        const config = topicConfig[selectedTopic];
        const checkedGroups = Array.from(document.querySelectorAll("#groupCheckboxes input:checked")).map(cb => cb.value);

        // Validate count: only enforce max when no groups are selected
        if (!count || count <= 0) {
          alert("Please enter a valid number of questions.");
          return;
        }
        if (checkedGroups.length === 0 && count > config.maxQuestions) {
          alert(`Please enter a valid number between 1 and ${config.maxQuestions}.`);
          return;
        }

        localStorage.setItem("questionCount", count);
        localStorage.setItem("selectedTopic", selectedTopic);
        localStorage.setItem("selectedGroups", JSON.stringify(checkedGroups));

        navigator.sendBeacon(`/api/log?page=quiz&topic=${encodeURIComponent(config.name)}`);
        window.location.href = "/game.html";
      }
    </script>
    <div class="donate-footer">
      <a href="#" onclick="alert('Hehe, không cần đâu ạ (nhưng có lòng thì vẫn nhận, nhắn cho namnv7 nha anh chị =)))) :3'); return false;">Donate ở đây</a>
    </div>
  </body>
</html>
